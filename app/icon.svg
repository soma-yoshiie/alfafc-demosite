<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ic_silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4ccc6"/>
    </linearGradient>
    <linearGradient id="ic_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d680"/>
      <stop offset="1" stop-color="#a9802f"/>
    </linearGradient>
    <radialGradient id="ic_bg" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </radialGradient>
    <radialGradient id="ic_ball" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#dfe4df"/>
      <stop offset="1" stop-color="#aab0aa"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="192" height="192" rx="44" fill="url(#ic_bg)"/>

  <!-- 戦術ボードの薄いマーキング -->
  <g stroke="#caa84a" stroke-width="1.2" fill="none" opacity="0.16">
    <rect x="74" y="10" width="52" height="26"/>
    <line x1="14" y1="100" x2="186" y2="100"/>
    <circle cx="100" cy="100" r="30"/>
  </g>
  <g stroke="#8a8f8a" stroke-width="2" opacity="0.18" stroke-linecap="round">
    <path d="M40 60 l10 10 M50 60 l-10 10"/>
    <path d="M150 150 l10 10 M160 150 l-10 10"/>
    <circle cx="46" cy="128" r="6" fill="none"/>
    <circle cx="160" cy="74" r="6" fill="none"/>
  </g>
  <g stroke="#caa84a" stroke-width="1.6" fill="none" opacity="0.3" stroke-dasharray="4 4">
    <path d="M34 150 q14 -54 44 -54"/>
  </g>

  <!-- A -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M100 46 L62 166" stroke="url(#ic_silver)" stroke-width="20"/>
    <path d="M100 46 L138 166" stroke="url(#ic_gold)" stroke-width="20"/>
    <path d="M76 126 L124 126" stroke="url(#ic_silver)" stroke-width="16"/>
  </g>

  <!-- ボール -->
  <g>
    <path d="M120 50 A 34 34 0 0 1 176 92" stroke="url(#ic_gold)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="142" cy="78" r="25" fill="url(#ic_ball)" stroke="#0a0e0c" stroke-width="3"/>
    <polygon points="142,70 150,76 147,86 137,86 134,76" fill="#14171a"/>
    <g stroke="#14171a" stroke-width="2.4" stroke-linecap="round">
      <line x1="142" y1="70" x2="142" y2="56"/>
      <line x1="150" y1="76" x2="162" y2="72"/>
      <line x1="147" y1="86" x2="153" y2="98"/>
      <line x1="137" y1="86" x2="131" y2="98"/>
      <line x1="134" y1="76" x2="122" y2="72"/>
    </g>
  </g>
</svg>
